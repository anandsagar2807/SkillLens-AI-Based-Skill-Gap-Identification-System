[phases.setup]
nixPkgs = ['python311', 'gcc', 'glibcLocales']

[phases.install]
cmds = ['pip install --no-cache-dir --upgrade pip', 'pip install --no-cache-dir -r requirements.txt']

[phases.build]
cmds = [
    'python -c "import nltk; nltk.download(\'punkt\'); nltk.download(\'punkt_tab\'); nltk.download(\'stopwords\')"',
    'python -c "from ml_model.train_model import train_model, save_model; model = train_model(); save_model(model)"'
]

[start]
cmd = 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}'